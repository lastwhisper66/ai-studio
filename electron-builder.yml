appId: com.ai-studio.app
productName: AI Studio
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - "!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-\
    update.yml,CHANGELOG.md,README.md}"
  - '!{.env,.env.*,.npmrc,package-lock.json}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
  - node_modules/better-sqlite3/**

win:
  executableName: ai-studio
  icon: build/icon.ico
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
    - target: zip
      arch: [x64]
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  oneClick: false
  allowToChangeInstallationDirectory: true
portable:
  artifactName: ${name}-${version}-portable.${ext}

mac:
  category: public.app-category.productivity
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  identity: null
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}

linux:
  category: Office
  icon: build/icon.png
  maintainer: lastwhisper66@gmail.com
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
    - target: tar.gz
      arch: [x64]
appImage:
  artifactName: ${productName}-${version}-${arch}.${ext}

npmRebuild: false
publish: null
