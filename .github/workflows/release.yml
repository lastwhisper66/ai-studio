name: Release (manual fallback)

# Primary release flow lives in release-please.yml (push to main).
# This workflow is a manual fallback for rebuilding artifacts or cutting
# an emergency release against an existing tag.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.0.4). Leave empty to use current HEAD.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: build:win
            artifact: dist-windows
          - os: macos-latest
            script: build:mac
            artifact: dist-macos
          - os: ubuntu-22.04
            script: build:linux
            artifact: dist-linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxtst-dev libx11-dev libxt-dev \
            libevdev-dev libudev-dev \
            libwayland-dev libxkbcommon-dev wayland-protocols

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run typecheck
        if: matrix.os != 'windows-latest'
        run: npm run typecheck

      - name: Build & package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run ${{ matrix.script }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.tar.gz
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: warn
          retention-days: 7

  upload:
    name: Attach artifacts to existing release
    needs: build
    runs-on: ubuntu-latest
    if: inputs.tag != ''
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          files: artifacts/*
          fail_on_unmatched_files: false
